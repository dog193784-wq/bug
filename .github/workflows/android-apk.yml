name: Build Android APK

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Install Gradle 8.4
        run: |
          curl -sSL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o gradle-8.4-bin.zip
          unzip -q gradle-8.4-bin.zip
          GRADLE_BIN="$PWD/gradle-8.4/bin/gradle"
          $GRADLE_BIN --version
          $GRADLE_BIN --version | grep -q 'Gradle 8.4'

      - name: Assemble debug APK
        run: $PWD/gradle-8.4/bin/gradle :app:assembleDebug --stacktrace --warning-mode all

      - name: Assemble release APK (unsigned)
        run: $PWD/gradle-8.4/bin/gradle :app:assembleRelease --stacktrace --warning-mode all

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: carelink-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: carelink-release-unsigned-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  signed-release:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    needs: build
    env:
      KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Install Gradle 8.4
        run: |
          curl -sSL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o gradle-8.4-bin.zip
          unzip -q gradle-8.4-bin.zip
          GRADLE_BIN="$PWD/gradle-8.4/bin/gradle"
          $GRADLE_BIN --version
          $GRADLE_BIN --version | grep -q 'Gradle 8.4'

      - name: Decode keystore
        run: |
          test -n "$KEYSTORE_BASE64"
          echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore

      - name: Build signed release APK
        run: |
          $PWD/gradle-8.4/bin/gradle :app:assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/release.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --stacktrace --warning-mode all

      - name: Upload signed release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: carelink-release-signed-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
